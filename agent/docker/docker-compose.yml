# Build-only compose file — builds the execution sandbox image.
# The dispatcher and web manager run locally; only task execution
# uses this Docker image via `docker run --rm`.
#
# Usage:
#   docker compose -f agent/docker/docker-compose.yml build
#
# The build context is agent/ (parent of this file's directory).
# The dockerfile path is relative to that context.
services:
  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: claude-agent:latest
