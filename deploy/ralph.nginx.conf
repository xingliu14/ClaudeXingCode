# Ralph Loop — nginx reverse proxy template
# 1. Replace YOUR_DOMAIN with your domain or VPS IP.
# 2. Run: sudo certbot --nginx -d YOUR_DOMAIN  (fills in SSL paths automatically)
# 3. Create htpasswd: sudo htpasswd -c /etc/nginx/.ralph-htpasswd YOUR_USERNAME
#
# Install:
#   sudo cp ralph.nginx.conf /etc/nginx/sites-available/ralph
#   sudo ln -s /etc/nginx/sites-available/ralph /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    # SSL — filled in by: sudo certbot --nginx -d YOUR_DOMAIN
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Password-protect the entire UI (single user is fine)
    auth_basic           "Ralph Loop";
    auth_basic_user_file /etc/nginx/.ralph-htpasswd;

    location / {
        proxy_pass         http://127.0.0.1:5001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
